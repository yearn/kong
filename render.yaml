previewsEnabled: false

services:
  - type: redis
    name: redis-starter-ingest-3
    region: ohio
    plan: starter
    maxmemoryPolicy: noeviction # recommended for message queues
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  - type: worker
    name: ingest-v-2
    region: ohio
    runtime: node
    plan: standard
    buildCommand: bun install --frozen-lockfile
    startCommand: bun run --filter ingest production
    envVars:
      - fromGroup: kong
      - key: NODE_VERSION
        value: lts
      - key: REDIS_HOST
        fromService:
          type: redis
          name: redis-starter-ingest-3
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: redis-starter-ingest-3
          property: port
