name: deploy

# Deploy the ingest worker to Render with 1Password as the source of truth for
# secrets. Every env var lives in the 1Password `kong` item (vault webops-prod);
# this workflow pushes them into the Render env group `kong` (fromGroup: kong in
# render.yaml) and then triggers a deploy via the Render API.
#
# IMPORTANT: turn OFF Render's own Auto-Deploy for the ingest-v-2 service so this
# workflow is the only thing that deploys (otherwise the git push and this API
# call both fire a deploy).
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-render
  cancel-in-progress: false

env:
  OP_VAULT: webops-prod
  OP_ITEM: kong
  RENDER_ENV_GROUP_ID: evg-d3dkc7jipnbc73ce23lg

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: 1Password/install-cli-action@v1

      - name: Sync 1Password -> Render env group
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          # Keys managed on the service itself (render.yaml), not the group.
          EXCLUDE="REDIS_HOST REDIS_PORT NODE_VERSION"

          # Enumerate env-var fields from the 1Password item. Upper-snake labels
          # only, skipping op defaults (notesPlain, username, password, ...).
          keys="$(op item get "$OP_ITEM" --vault "$OP_VAULT" --format json \
            | jq -r '.fields[] | select(.value != null) | select(.label | test("^[A-Z][A-Z0-9_]+$")) | .label')"

          if [ -z "$keys" ]; then
            echo "no env-var fields found in 1Password item $OP_VAULT/$OP_ITEM" >&2
            exit 1
          fi

          for key in $keys; do
            case " $EXCLUDE " in *" $key "*) echo "skip $key (service-managed)"; continue;; esac
            value="$(op read "op://${OP_VAULT}/${OP_ITEM}/${key}")"
            curl -fsS -X PUT \
              "https://api.render.com/v1/env-groups/${RENDER_ENV_GROUP_ID}/env-vars/${key}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg v "$value" '{value: $v}')" \
              -o /dev/null
            echo "synced $key"
          done

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          deploy_id="$(curl -fsS -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' | jq -r '.id')"

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "failed to create deploy" >&2
            exit 1
          fi
          echo "deploy $deploy_id created; waiting for it to go live"

          for _ in $(seq 1 80); do
            status="$(curl -fsS \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.status')"
            echo "status=$status"
            case "$status" in
              live) echo "deploy succeeded"; exit 0 ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "deploy failed: $status" >&2; exit 1 ;;
            esac
            sleep 15
          done

          echo "timed out waiting for deploy $deploy_id" >&2
          exit 1
